services:
  postgres:
    image: postgres:15-alpine
    container_name: medichips-link-db
    environment:
      POSTGRES_USER: medichips
      POSTGRES_PASSWORD: medichips
      POSTGRES_DB: medichips_link
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medichips -d medichips_link"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: medichips-link-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
