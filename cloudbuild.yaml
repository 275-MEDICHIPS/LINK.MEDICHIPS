steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-f"
      - "docker/Dockerfile.web"
      - "-t"
      - "asia-northeast3-docker.pkg.dev/medichips-new/medichips-link/web:latest"
      - "-t"
      - "asia-northeast3-docker.pkg.dev/medichips-new/medichips-link/web:${SHORT_SHA}"
      - "."
    timeout: "600s"

images:
  - "asia-northeast3-docker.pkg.dev/medichips-new/medichips-link/web:latest"
  - "asia-northeast3-docker.pkg.dev/medichips-new/medichips-link/web:${SHORT_SHA}"

options:
  machineType: "E2_HIGHCPU_8"
  logging: CLOUD_LOGGING_ONLY
timeout: "900s"
